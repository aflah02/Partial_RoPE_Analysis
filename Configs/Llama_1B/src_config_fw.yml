{

  "use_qk_layernorm": false, # [Use to set QK LayerNorm, set to false for no QK LayerNorm]

  # parallelism settings ( you will want to change these based on your cluster setup, ideally scheduling pipeline stages
  # across the node boundaries )
  "pipe_parallel_size": 1,
  "model_parallel_size": 1,
  "make_vocab_size_divisible_by": 128, # If MP=2 then Need to set as 64 because code makes it divisible by MP*makes_vocab_size_divisible_by

  # model settings
  "num_layers": 16,
  "hidden_size": 2048,
  "num_attention_heads": 32,
  "num_kv_heads": 8,
  "intermediate_size": 24576, # 8192*3

  "seq_length": 2048, # [Set to your desired sequence length, should be equal to max_position_embeddings. In the paper we use 1024, 2048, 4096 and 8192]
  "max_position_embeddings": 2048, # [Set to your desired max position embeddings, should be equal to seq_length. In the paper we use 1024, 2048, 4096 and 8192]

  "pos_emb": "none", # [Use for NoPE, set to "rotary" for RoPE]
  "rotary_pct": 1.0, # [Use to set RoPE PCT, ignored if pos_emb is not rotary]

  "no_weight_tying": true,
  "gpt_j_residual": false,
  "output_layer_parallelism": "column",
  "norm": "rmsnorm",
  "rms_norm_epsilon": 1.0e-5,
  "rmsnorm_fusion": true,
  # Flash Attention
  "attention_config": [[["flash"], 36]],

  # these should provide some speedup but takes a while to build, set to true if desired
  "scaled_upper_triang_masked_softmax_fusion": true,
  "scaled_masked_softmax_fusion": true,
  "bias_gelu_fusion": false,
  "rope_fusion": true,
  # "layernorm_fusion": false,
  "use_bias_in_norms": false,
  "use_bias_in_attn_linear": false,
  "activation": "swiglu",
  "use_flashattn_swiglu": true,
  "mlp_multiple_of": 256,

  # init methods (Copied from OLMo 2)
  "init_method": "normal",
  "output_layer_init_method": "normal",
  "init_method_std": 0.02,

  # optimizer settings
  "optimizer": {
    "type": "Adam",
    "params": {
      "lr": 0.0004,
      "betas": [0.9, 0.95],
      "eps": 1.0e-8,
    }
  },

  # for all zero_optimization options, see https://www.deepspeed.ai/docs/config-json/#zero-optimizations-for-fp16-training
  "zero_optimization": {
    "stage": 1,
    "allgather_partitions": true,
    "allgather_bucket_size": 1260000000,
    "overlap_comm": true,
    "reduce_scatter": true,
    "reduce_bucket_size": 1260000000,
    "contiguous_gradients": true,
    "cpu_offload": false
  },
  "min_lr": 0.00004,

  # batch / data settings
  # Configuration depends on sequence length to match the effective batch size across sequence lengths
  # 1024 - train_micro_batch_size_per_gpu: 128, gradient_accumulation_steps: 2
  # 2048 - train_micro_batch_size_per_gpu: 64, gradient_accumulation_steps: 2
  # 4096 - train_micro_batch_size_per_gpu: 32, gradient_accumulation_steps: 2
  # 8192 - train_micro_batch_size_per_gpu: 16, gradient_accumulation_steps: 2
  "train_micro_batch_size_per_gpu": , # [Set based on your sequence length, see comment above for configuration used in the paper]
  "gradient_accumulation_steps": , # [Set based on your sequence length, see comment above for configuration used in the paper]
  "data_impl": "mmap",

  # activation checkpointing
  "checkpoint_activations": true,
  "checkpoint_num_layers": 1,
  "partition_activations": true,
  "synchronize_each_layer": true,

  # regularization
  "gradient_clipping": 1.0,
  "weight_decay": 0.1,
  "hidden_dropout": 0,
  "attention_dropout": 0,


   # precision settings
  "precision": "bfloat16",
  "fp32_allreduce": true,
  "bf16": {
    "enabled": true
  },
  "data_types": {
    "grad_accum_dtype": "fp32"
  },
  # misc. training settings
  "train_iters": 12000,
  "lr_decay_iters": 12000,
  "distributed_backend": "nccl",
  "lr_decay_style": "cosine",
  "warmup": 0.05,
  "checkpoint_factor": 1500,
  "eval_interval": 2000,
  "eval_iters": 10,
  "extra_save_iters": [1],

  # logging
  "log_interval": 10,
  "steps_per_print": 50,
  "wall_clock_breakdown": true,

  "no_ssh_check": true,
}